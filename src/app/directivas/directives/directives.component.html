<div class="students-list">
    <ul>
        <li *ngFor="let student of students"
            [ngClass]="{ 'approved': isApproved(student.average), 'failed': !isApproved(student.average) }">
        {{ student.name | titlecase }} {{ student.lastName  | titlecase }} - Edad: {{ student.age }}, Promedio: {{ student.average }}
        </li>
    </ul>
</div>
